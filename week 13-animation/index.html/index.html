<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Grow Girl - Animation Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f7f4;
            color: #2d5a27;
            text-align: center;
            padding: 50px;
            overflow-x: hidden; /* Prevents scrollbars if things bounce */
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #388E3C;
            font-size: 3rem;
            /* ANIMATION 1: Continuous Floating Effect (Keyframes) */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .plant-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        /* ANIMATION 2: Hover Grow Effect (10 XP) */
        .pot-emoji {
            font-size: 80px;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pot-emoji:hover {
            transform: scale(1.3) rotate(10deg);
        }

        /* ANIMATION 3: Click Animation Class (Triggered by JS) */
        .bloom-effect {
            animation: bloom 0.6s ease-out;
        }

        @keyframes bloom {
            0% { filter: hue-rotate(0deg); transform: scale(1); }
            50% { filter: hue-rotate(90deg); transform: scale(1.5); }
            100% { filter: hue-rotate(0deg); transform: scale(1); }
        }

        /* ANIMATION 4: Background Fade-in on load */
        .fade-in-text {
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }

        button:active {
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <h1 id="title">You Grow Girl</h1>
    
    <div class="plant-box">
        <div class="pot-emoji" id="plant" title="Hover me!">🪴</div>
        
        <p class="fade-in-text">Hover the plant to see it grow, or click the button to make it bloom!</p>

        <button onclick="triggerBloom(event)">Water the Plant</button>
    </div>

    <script>
        function triggerBloom(event) {
            // Prevent default per instructions
            event.preventDefault();

            var plant = document.getElementById("plant");
            
            // Add the animation class
            plant.classList.add("bloom-effect");

            // Remove it after animation ends so we can click again
            setTimeout(function() {
                plant.classList.remove("bloom-effect");
            }, 600);
        }
    </script>
</body>
</html>
